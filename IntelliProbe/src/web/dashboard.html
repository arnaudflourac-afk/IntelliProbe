<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliProbe — Intelligence Workstation Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #0f0f15;
            --bg-card: rgba(18, 18, 28, 0.65);
            --bg-card-solid: #12121c;
            --border-glow: rgba(0, 234, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #a1a1b5;
            --text-muted: #6b6b8d;
            --accent-cyan: #00eaff;
            --accent-purple: #b883ff;
            --accent-pink: #ff6b9d;
            --accent-green: #00ff88;
            --accent-orange: #ffaa44;
            --gradient-1: linear-gradient(135deg, #00eaff, #b883ff);
            --gradient-2: linear-gradient(135deg, #ff6b9d, #ffaa44);
            --gradient-3: linear-gradient(135deg, #00ff88, #00eaff);
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 234, 255, 0.08);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.5);
            --blur-bg: blur(16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .bg-aura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-aura::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #0d0d1a, #05050a);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 25s infinite ease-in-out;
        }

        .orb-1 { width: 500px; height: 500px; background: #00eaff; top: -200px; right: -150px; }
        .orb-2 { width: 450px; height: 450px; background: #b883ff; bottom: -150px; left: -150px; animation-delay: -8s; }
        .orb-3 { width: 350px; height: 350px; background: #ff6b9d; top: 40%; left: 30%; animation-delay: -15s; opacity: 0.2; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .header {
            position: relative;
            z-index: 50;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(5, 5, 10, 0.7);
            backdrop-filter: var(--blur-bg);
        }

        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            font-size: 2rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-badge {
            font-size: 0.65rem;
            font-weight: 500;
            padding: 0.2rem 0.8rem;
            margin-left: 10px; 
            background: rgba(0, 234, 255, 0.12);
            border-radius: 40px;
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 234, 255, 0.2);
        }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.5rem 1.25rem;
            border-radius: 40px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }

        .btn-refresh:hover {
            background: rgba(0, 234, 255, 0.1);
            border-color: rgba(0, 234, 255, 0.3);
            color: var(--accent-cyan);
            transform: translateY(-1px);
        }

        .nav-section {
            position: relative;
            z-index: 49;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(8, 8, 14, 0.5);
            backdrop-filter: blur(12px);
        }

        .nav-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0.5rem 2rem;
        }

        .nav-scroll {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.25rem;
        }

        .nav-item {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            white-space: nowrap;
            letter-spacing: -0.01em;
            border: 1px solid transparent;
        }

        .nav-item i {
            margin-right: 8px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 234, 255, 0.12), rgba(183, 131, 255, 0.08));
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 234, 255, 0.25);
        }

        .main {
            position: relative;
            z-index: 10;
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section {
            display: none;
            animation: fadeUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .section.active {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: var(--blur-bg);
            border-radius: 28px;
            padding: 1.6rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.25s ease;
        }

        .card:hover {
            border-color: rgba(0, 234, 255, 0.15);
            background: rgba(18, 18, 28, 0.75);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header i {
            font-size: 1.3rem;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card-header h2 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        .card-header .badge-count {
            margin-left: auto;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            color: var(--text-muted);
        }

        .subsection-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-orange);
            margin: 1rem 0 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-tile {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        .stat-tile:hover {
            border-color: rgba(0, 234, 255, 0.2);
            background: rgba(0, 0, 0, 0.45);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .hero-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.8rem;
        }

        .hero-card {
            background: linear-gradient(135deg, rgba(0, 234, 255, 0.06), rgba(183, 131, 255, 0.03));
            border-radius: 32px;
            padding: 1.6rem;
            text-align: center;
            border: 1px solid rgba(0, 234, 255, 0.15);
            backdrop-filter: blur(8px);
        }

        .hero-number {
            font-size: 3.2rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .hero-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .hero-tier {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .tier-High, .tier-Expert { background: #00ff8822; color: #00ff88; border: 1px solid #00ff8844; }
        .tier-Mid, .tier-Professional { background: #ffaa4422; color: #ffaa44; border: 1px solid #ffaa4444; }
        .tier-Entry, .tier-Intermediate { background: #ff6b9d22; color: #ff6b9d; border: 1px solid #ff6b9d44; }
        .tier-Edge, .tier-Beginner { background: #88888822; color: #aaa; border: 1px solid #88888844; }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
        }

        .badge {
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.15s;
        }

        .badge-success { background: #00ff8822; color: #00ff88; border: 1px solid #00ff8844; }
        .badge-warning { background: #ff444422; color: #ff8888; border: 1px solid #ff444444; }
        .badge-info { background: #00eaff22; color: #00eaff; border: 1px solid #00eaff44; }
        .badge-neutral { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            table-layout: auto;
        }

        .data-table th {
            text-align: left;
            padding: 8px 10px;
            background: rgba(0, 234, 255, 0.08);
            color: #00eaff;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
        }

        .data-table td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .data-table code {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            display: inline-block;
        }

        .code-preview {
            background: #0a0a12;
            border-radius: 20px;
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.7rem;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid rgba(0, 234, 255, 0.08);
        }

        .prompt-selector {
            background: #0a0a12;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(0, 234, 255, 0.15);
        }

        .prompt-selector select, .prompt-selector textarea {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: #fff;
            font-family: inherit;
            width: 100%;
            margin-bottom: 0.8rem;
        }

        .prompt-selector textarea {
            color: #a0a0b0;
            resize: vertical;
        }

        .prompt-selector button {
            background: linear-gradient(135deg, #00eaff22, #b883ff22);
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: #00eaff;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 0.5rem;
        }

        .prompt-selector button:hover {
            background: rgba(0, 234, 255, 0.2);
            transform: translateY(-1px);
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-group button {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-group button:hover {
            background: rgba(0, 234, 255, 0.15);
            border-color: rgba(0, 234, 255, 0.3);
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            gap: 1.5rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(0, 234, 255, 0.15);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                text-align: center;
            }
            .main {
                padding: 1rem;
            }
            .nav-scroll {
                justify-content: flex-start;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 0.5rem;
            }
            .btn-group {
                flex-direction: column;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 234, 255, 0.3);
            border-radius: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00eaff, #b883ff);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        #section-system-libraries .data-table {
            table-layout: auto;
        }
        #section-system-libraries .data-table th:nth-child(1) { width: 35%; }
        #section-system-libraries .data-table th:nth-child(2) { width: 12%; }
        #section-system-libraries .data-table th:nth-child(3) { width: 10%; }
        #section-system-libraries .data-table th:nth-child(4) { width: 43%; }
        #section-system-libraries .data-table td {
            vertical-align: top;
            word-wrap: break-word;
        }
        #section-system-libraries .data-table code {
            white-space: normal;
            word-break: break-all;
            display: inline-block;
            max-width: 280px;
        }
    </style>
</head>
<body>

<div class="bg-aura">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<header class="header">
    <div class="header-inner">
        <div class="logo-group">
            <i class="fas fa-microchip logo-icon"></i>
            <div>
                <span class="logo-text">IntelliProbe</span>
                <span class="logo-badge">By Arnaud Flourac</span>
            </div>
        </div>
        <button class="btn-refresh" onclick="loadData()">
            <i class="fas fa-sync-alt"></i> Analyser
        </button>

</header>

<nav class="nav-section">
    <div class="nav-container">
        <div class="nav-scroll" id="navMenu"></div>
    </div>
</nav>

<main class="main" id="appContent">
    <div class="loading-state">
        <div class="spinner"></div>
        <div style="color: var(--text-muted); font-size: 0.85rem;">Chargement de la configuration système...</div>
    </div>
</main>

    const isolationOptions = {
        none: "L'environnement sera installé directement sur le système (pas d'isolation supplémentaire)",
        venv: "L'environnement doit être isolé dans un virtual environment (venv/conda/nvm/cargo)",
        docker: "L'environnement doit être conteneurisé avec Docker. Génère un Dockerfile multi-stage et docker-compose.yml"
    };

    const formatOptions = {
        standard: "[FORMAT DE RÉPONSE]\n- Code bash exécutable commenté\n- Explications des choix techniques\n- Commandes d'installation vérifiées\n- Vérifications post-installation",
        minimal: "[FORMAT DE RÉPONSE]\n- Script bash uniquement, bien commenté\n- Pas d'explication hors script",
        detailed: "[FORMAT DE RÉPONSE]\n- Documentation complète\n- Explications détaillées de chaque étape\n- Alternatives possibles\n- Dépannage inclus"
    };

    function generateCustomPrompt(data, category, isolationMode = "none", formatMode = "standard", customInstruction = "") {
        const template = promptTemplates[category];
        if (!template) return "Catégorie non trouvée";
        
        const isolationText = isolationOptions[isolationMode] || isolationOptions.none;
        const formatText = formatOptions[formatMode] || formatOptions.standard;
        
        let context = `Tu es un assistant expert en développement. Voici la configuration de la machine :
- CPU: ${data.ai_hardware?.cpu_cores || "?"} cœurs
- RAM: ${data.ai_hardware?.ram_gb?.toFixed(1) || "?"} GB
- GPU: ${data.ai_hardware?.gpu_model || "None"} (${data.ai_hardware?.gpu_memory_mb || "0"} MB)
- OS: ${data.system_info?.os_name || "Unknown"} ${data.system_info?.os_version || ""}
- Kernel: ${data.system_info?.kernel_version || "Unknown"}

${isolationText}

Génère une configuration d'environnement ${template.name} optimisée.

${formatText}`;
        
        let prompt = `[SYSTEME]\n${context}\n\n[INSTRUCTIONS]\n${template.desc}`;
        if (customInstruction.trim()) prompt += `\n\n[DEMANDE SPÉCIFIQUE]\n${customInstruction}`;
        
        return prompt;
    }

    // ============================================================================
    // EXPORT DES DÉPENDANCES PAR LANGAGE
    // ============================================================================

    function exportDependenciesForCategory(category) {
        const data = fullData;
        if (!data) return;
        
        const template = promptTemplates[category];
        if (!template) return;
        
        let packages = [];
        let fileType = "dependencies";
        let fileContent = "";
        
        if (template.packageField && data.dev_capabilities?.[template.packageField]) {
            packages = data.dev_capabilities[template.packageField];
            fileType = template.packageField;
        } else if (category === "cpp") {
            // Pour C/C++, on prend les bibliothèques système
            const uniqueLibs = new Map();
            for (const lib of data.system_libraries || []) {
                const baseName = lib.name.split('.so')[0];
                if (!uniqueLibs.has(baseName)) {
                    uniqueLibs.set(baseName, lib);
                }
            }
            packages = Array.from(uniqueLibs.values()).slice(0, 50);
            fileType = "system_libraries";
        }
        
        // Format JSON
        const jsonData = {
            export_date: new Date().toISOString(),
            category: template.name,
            machine: data.system_info?.hostname || "unknown",
            package_count: packages.length,
            packages: packages.map(p => ({
                name: p.name,
                version: p.version || null,
                description: p.description || null
            }))
        };
        
        const jsonStr = JSON.stringify(jsonData, null, 2);
        const jsonBlob = new Blob([jsonStr], { type: "application/json" });
        const jsonUrl = URL.createObjectURL(jsonBlob);
        const jsonA = document.createElement("a");
        jsonA.href = jsonUrl;
        jsonA.download = `${category}_dependencies_${new Date().toISOString().slice(0, 19).replace(/:/g, "-")}.json`;
        jsonA.click();
        URL.revokeObjectURL(jsonUrl);
        
        // Format TXT
        let txtContent = `╔══════════════════════════════════════════════════════════════╗\n`;
        txtContent += `║         ${template.name.toUpperCase()} - DEPENDANCES DÉTECTÉES          ║\n`;
        txtContent += `╚══════════════════════════════════════════════════════════════╝\n\n`;
        txtContent += `📅 Export: ${new Date().toLocaleString()}\n`;
        txtContent += `💻 Machine: ${data.system_info?.hostname}\n`;
        txtContent += `📦 Nombre de packages: ${packages.length}\n\n`;
        
        for (const pkg of packages) {
            txtContent += `  • ${pkg.name}`;
            if (pkg.version) txtContent += ` (${pkg.version})`;
            if (pkg.description) txtContent += ` - ${pkg.description}`;
            txtContent += `\n`;
        }
        
        const txtBlob = new Blob([txtContent], { type: "text/plain" });
        const txtUrl = URL.createObjectURL(txtBlob);
        const txtA = document.createElement("a");
        txtA.href = txtUrl;
        txtA.download = `${category}_dependencies_${new Date().toISOString().slice(0, 19).replace(/:/g, "-")}.txt`;
        txtA.click();
        URL.revokeObjectURL(txtUrl);
    }

    // FONCTIONS PRINCIPALES
    // ============================================================================

    function getInstalledLanguages(data) {
        return (data.dev_capabilities?.languages || [])
            .filter(lang => lang.installed === true)
            .map(lang => lang.name);
    }

    function getLanguageIcon(langName, config) {
        if (config?.fab) return `<i class="fab ${config.icon}" style="color: ${config.color}"></i>`;
        return `<i class="fas ${config?.icon || 'fa-code'}" style="color: ${config?.color || '#00eaff'}"></i>`;
    }

    function renderLanguageSection(data, langName) {
        const langInfo = data.dev_capabilities?.languages?.find(l => l.name === langName);
        const config = languageConfig[langName];
        if (!langInfo || !langInfo.installed) return '';
        
        const packages = data.dev_capabilities?.[config?.packageField] || [];
        const iconHtml = getLanguageIcon(langName, config);
        
        let html = `<div class="card"><div class="card-header">${iconHtml}<h2>${config?.emoji || '💻'} ${langName} — ${langInfo.version || 'inconnue'}</h2><div class="badge-count">${langInfo.performance_rating}/100</div></div>
            <div class="subsection-title">📦 Package manager: ${langInfo.package_manager || 'Non détecté'}</div>
            <div class="badge-group"><span class="badge ${langInfo.lsp_available ? 'badge-success' : 'badge-warning'}">LSP: ${langInfo.lsp_available ? '✅' : '❌'}</span>
            <span class="badge ${langInfo.debugger_available ? 'badge-success' : 'badge-warning'}">Debugger: ${langInfo.debugger_available ? '✅' : '❌'}</span>
            <span class="badge ${langInfo.linting_available ? 'badge-success' : 'badge-warning'}">Linter: ${langInfo.linting_available ? '✅' : '❌'}</span>
            <span class="badge ${langInfo.formatting_available ? 'badge-success' : 'badge-warning'}">Formatter: ${langInfo.formatting_available ? '✅' : '❌'}</span></div>`;
        
        if (packages && packages.length > 0) {
            html += `<div class="subsection-title">📦 Packages installés (${packages.length})</div><div class="table-wrapper"><table class="data-table"><thead><tr><th>Package</th><th>Version</th><th>Description</th></tr></thead><tbody>
                ${packages.slice(0, 30).map(p => `<tr><td><strong>${escapeHtml(p.name)}</strong></td><td class="stat-value" style="font-size:0.7rem;">${p.version || '-'}</td><td>${p.description || config?.packageDesc || 'Package'}</td></tr>`).join('')}
            </tbody></table></div>`;
            if (packages.length > 30) html += `<div class="badge badge-neutral">+ ${packages.length - 30} autres packages</div>`;
        } else if (langName !== "C/C++") {
            html += `<div class="badge badge-neutral">Aucun package détecté</div>`;
        }
        html += `</div>`;
        return html;
    }

    function buildMenu() {
        const d = fullData;
        if (!d) return;
        const installedLanguages = getInstalledLanguages(d);
        const dynamicSections = installedLanguages.map(langName => {
            const config = languageConfig[langName];
            return { id: `lang-${langName.toLowerCase().replace(/[^a-z]/g, '-')}`, name: `${config?.emoji || '💻'} ${langName}`, icon: config?.icon || "fa-code", fab: config?.fab || false };
        });
        const allSections = [...fixedSections, ...dynamicSections];
        const container = document.getElementById('navMenu');
        if (!container) return;
        container.innerHTML = allSections.map(s => `<div class="nav-item" data-section="${s.id}"><i class="${s.fab ? 'fab' : 'fas'} ${s.icon}"></i> ${s.name}</div>`).join('');
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const sectionId = btn.dataset.section;
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                const target = document.getElementById(`section-${sectionId}`);
                if (target) target.classList.add('active');
            });
        });
    }

    function exportCurrentDependencies() {
        const categorySelect = document.getElementById('prompt-category');
        if (categorySelect && categorySelect.value) {
            exportDependenciesForCategory(categorySelect.value);
        }
    }

    function generateAndDisplayPrompt() {
        const category = document.getElementById('prompt-category')?.value;
        const isolation = document.getElementById('prompt-isolation')?.value;
        const format = document.getElementById('prompt-format')?.value;
        const instruction = document.getElementById('prompt-instruction')?.value || "";
        if (!fullData || !category) return;
        const prompt = generateCustomPrompt(fullData, category, isolation, format, instruction);
        const container = document.getElementById('generated-prompt-text');
        if (container) {
            container.innerHTML = escapeHtml(prompt);
            container.style.color = "#00eaff";
        }
    }

    function resetPromptDisplay() {
        const container = document.getElementById('generated-prompt-text');
        if (container) {
            container.innerHTML = "Sélectionnez une catégorie et cliquez sur \"Générer\"";
            container.style.color = "";
        }
        const instructionField = document.getElementById('prompt-instruction');
        if (instructionField) instructionField.value = "";
    }

    function copyGeneratedPrompt() {
        const promptText = document.getElementById('generated-prompt-text');
        if (!promptText) return;
        const text = promptText.innerText || promptText.textContent;
        if (text === "Sélectionnez une catégorie et cliquez sur \"Générer\"") return;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.btn-refresh');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copié !';
            setTimeout(() => { btn.innerHTML = original; }, 2000);
        });
    }

    function renderAPIs(d) { const a = d.ai_compatibility?.compute_apis || []; return `<div class="card"><div class="card-header"><i class="fas fa-plug"></i><h2>APIs Compute</h2></div><div class="grid-stats">${a.map(api=>`<div class="stat-tile"><div class="stat-value" style="font-size:1rem;">${api.api}</div><div class="stat-label">${api.supported?'✅ Supporté':'❌ Non supporté'}</div></div>`).join('')}</div></div>`; }
    function renderAIWorkloads(d) { const r = d.ai_recommendations; return `<div class="card"><div class="card-header"><i class="fas fa-brain"></i><h2>Workloads IA</h2></div><div class="subsection-title"><i class="fas fa-eye"></i> Computer Vision</div><div class="badge-group">${r.computer_vision?.map(v=>`<span class="badge badge-info">${v}</span>`).join('')||''}</div><div class="subsection-title"><i class="fas fa-language"></i> NLP</div><div class="badge-group">${r.nlp?.map(v=>`<span class="badge badge-info">${v}</span>`).join('')||''}</div><div class="subsection-title"><i class="fas fa-palette"></i> Générative</div><div class="badge-group">${r.generative_ai?.map(v=>`<span class="badge badge-info">${v}</span>`).join('')||''}</div></div>`; }
    function renderLanguages(d) { const l = d.dev_capabilities?.languages || []; return `<div class="card"><div class="card-header"><i class="fas fa-code"></i><h2>Langages</h2></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>Langage</th><th>Installé</th><th>Version</th><th>Score</th></tr></thead><tbody>${l.map(l=>`<tr><td><strong>${l.name}</strong></td><td class="${l.installed ? 'badge-success' : 'badge-warning'}">${l.installed ? '✅' : '❌'}</td><td class="stat-value" style="font-size:0.8rem;">${l.version||'-'}</td><td>${l.performance_rating}/100${renderProgressBar(l.performance_rating)}</td></tr>`).join('')}</tbody></table></div></div>`; }
    function renderBuildTools(d) { const t = d.dev_capabilities?.build_tools || []; return `<div class="card"><div class="card-header"><i class="fas fa-hammer"></i><h2>Outils de build</h2></div><div class="badge-group">${t.map(t=>`<span class="badge ${t.installed ? 'badge-success' : 'badge-warning'}">${t.name}</span>`).join('')}</div></div>`; }
    function renderContainers(d) { const c = d.dev_capabilities?.containers || {}; return `<div class="card"><div class="card-header"><i class="fas fa-docker"></i><h2>Conteneurs</h2></div><div class="grid-stats"><div class="stat-tile"><div class="stat-value">${c.docker ? '✅' : '❌'}</div><div class="stat-label">Docker</div></div><div class="stat-tile"><div class="stat-value">${c.kubernetes_cli ? '✅' : '❌'}</div><div class="stat-label">Kubectl</div></div><div class="stat-tile"><div class="stat-value">${c.compose_available ? '✅' : '❌'}</div><div class="stat-label">Compose</div></div></div></div>`; }
    function renderDatabases(d) { const db = d.dev_capabilities?.databases || []; return `<div class="card"><div class="card-header"><i class="fas fa-database"></i><h2>Bases de données</h2></div><div class="badge-group">${db.map(db=>`<span class="badge ${db.installed ? 'badge-success' : 'badge-warning'}">${db.name}</span>`).join('')}</div></div>`; }
    function renderVersionControl(d) { const v = d.dev_capabilities?.version_control || {}; return `<div class="card"><div class="card-header"><i class="fas fa-code-branch"></i><h2>Version Control</h2></div><div class="grid-stats"><div class="stat-tile"><div class="stat-value">${v.git ? '✅' : '❌'}</div><div class="stat-label">Git</div></div><div class="stat-tile"><div class="stat-value">${v.git_lfs ? '✅' : '❌'}</div><div class="stat-label">Git LFS</div></div></div></div>`; }
    function renderIDEs(d) { const i = d.dev_capabilities?.ides || []; return `<div class="card"><div class="card-header"><i class="fas fa-laptop-code"></i><h2>Environnements</h2></div><div class="badge-group">${i.map(i=>`<span class="badge ${i.detected ? 'badge-success' : 'badge-warning'}">${i.name}</span>`).join('')}</div></div>`; }
    function renderMonitoring(d) { const m = d.dev_capabilities?.monitoring_tools || {}; return `<div class="card"><div class="card-header"><i class="fas fa-chart-line"></i><h2>Monitoring</h2></div><div class="badge-group">${Object.entries(m).map(([k,v])=>`<span class="badge ${v ? 'badge-success' : 'badge-warning'}">${k}</span>`).join('')}</div></div>`; }
    function renderDevWorkloads(d) { const r = d.dev_recommendations; return `<div class="card"><div class="card-header"><i class="fas fa-rocket"></i><h2>Workloads Dev</h2></div><div class="subsection-title"><i class="fas fa-globe"></i> Web</div><div class="badge-group">${r.web_development?.map(v=>`<span class="badge badge-info">${v}</span>`).join('')||''}</div><div class="subsection-title"><i class="fas fa-server"></i> Backend</div><div class="badge-group">${r.backend_development?.map(v=>`<span class="badge badge-info">${v}</span>`).join('')||''}</div><div class="subsection-title"><i class="fas fa-cloud-upload-alt"></i> DevOps</div><div class="badge-group">${r.devops?.map(v=>`<span class="badge badge-info">${v}</span>`).join('')||''}</div></div>`; }
    function renderToolchain(d) { const t = d.dev_toolchain; return `<div class="card"><div class="card-header"><i class="fas fa-sliders-h"></i><h2>Toolchain</h2></div><div class="subsection-title">Shell suggéré</div><div class="badge badge-info">${t.suggested_shell}</div><div class="subsection-title">Extensions VS Code</div><div class="badge-group">${t.vscode_extensions?.map(e=>`<span class="badge badge-info">${e}</span>`).join('')||''}</div><div class="subsection-title">Aliases Git</div><div class="code-preview">${t.git_aliases?.map(a=>`git config --global alias.${a}`).join('\n')||''}</div></div>`; }
    function renderSystemLibraries(data) {
        if (!data || !data.system_libraries || data.system_libraries.length === 0) return `<div class="card"><div class="card-header"><i class="fas fa-cube"></i><h2>📚 Librairies du système (.so)</h2></div><div class="badge badge-warning">Aucune bibliothèque détectée</div></div>`;
        const uniqueLibs = new Map();
        for (const lib of data.system_libraries) {
            const baseName = lib.name.replace(/\.so\.\d+(\.\d+)*$/, '').replace(/\.so$/, '');
            if (!uniqueLibs.has(baseName)) uniqueLibs.set(baseName, lib);
        }
        const libsArray = Array.from(uniqueLibs.values());
        const byCategory = {};
        for (const lib of libsArray) { if (!byCategory[lib.category]) byCategory[lib.category] = []; byCategory[lib.category].push(lib); }
        let html = `<div class="card"><div class="card-header"><i class="fas fa-cube"></i><h2>📚 Librairies du système (.so)</h2><div class="badge-count">${libsArray.length} librairies</div></div>`;
        for (const category of Object.keys(byCategory).sort()) {
            html += `<div class="subsection-title"><i class="fas fa-tag"></i> ${category}</div><div class="table-wrapper"><table class="data-table"><thead><tr><th>Bibliothèque</th><th>Version</th><th>Taille</th><th>Description</th></tr></thead><tbody>`;
            for (const lib of byCategory[category]) {
                let sizeStr = lib.size_bytes > 1024*1024 ? (lib.size_bytes/(1024*1024)).toFixed(1)+' MB' : (lib.size_bytes/1024).toFixed(0)+' KB';
                html += `<tr><td><strong>${escapeHtml(lib.name)}</strong></td><td class="stat-value">${lib.version || '-'}</td><td>${sizeStr}</td><td>${escapeHtml(lib.description)}</td></tr>`;
            }
            html += `</tbody></table></div>`;
        }
        html += `</div>`;
        return html;
    }
    function renderSnippets(d) { const c = d.ai_init_code; return `<div class="card"><div class="card-header"><i class="fas fa-file-code"></i><h2>Extraits de code</h2></div><div class="subsection-title">PyTorch</div><div class="code-preview">${escapeHtml(c.pytorch_device_config)}</div><div class="subsection-title">TensorFlow</div><div class="code-preview">${escapeHtml(c.tensorflow_device_config)}</div><div class="subsection-title">FFmpeg HW</div><div class="code-preview">${escapeHtml(c.ffmpeg_hwaccel_config)}</div></div>`; }
    function renderRaw(d) { return `<div class="card"><div class="card-header"><i class="fas fa-database"></i><h2>Données brutes (JSON)</h2></div><div class="code-preview" style="max-height:70vh; overflow-y:auto;">${escapeHtml(JSON.stringify(d,null,2))}</div></div>`; }
    function renderNPUs(d) {
        const npus = d.dev_capabilities?.npus || [];
        if (npus.length === 0) return `<div class="card"><div class="card-header"><i class="fas fa-microchip"></i><h2>🧠 NPU</h2><div class="badge-count">0</div></div><div class="badge badge-warning">Aucun NPU détecté</div><div class="subsection-title">📌 Note</div><div class="badge badge-neutral">Les NPU sont des accélérateurs matériels dédiés à l'IA.</div></div>`;
        return `<div class="card"><div class="card-header"><i class="fas fa-microchip"></i><h2>🧠 NPU</h2><div class="badge-count">${npus.length}</div></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>NPU</th><th>Driver</th><th>API</th><th>TOPS</th><th>Memory</th></tr></thead><tbody>${npus.map(n => `<tr><td><strong>${escapeHtml(n.name)}</strong></td><td class="stat-value">${n.driver || '-'}</td><td>${n.api || '-'}</td><td>${n.max_tops ? n.max_tops + ' TOPS' : 'N/A'}</td><td>${n.memory_mb ? n.memory_mb + ' MB' : 'N/A'}</td></tr>`).join('')}</tbody></table></div></div>`;
    }

    function renderProgressBar(value, max = 100) {
        const percent = Math.min(100, (value / max) * 100);
        return `<div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>`;
    }

    function escapeHtml(t) { return t ? String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : ''; }

    async function loadData() {
        try {
            const res = await fetch('/data');
            fullData = await res.json();
            buildMenu();
            renderComplete();
            document.getElementById('section-summary')?.classList.add('active');
            document.querySelector('.nav-item')?.classList.add('active');
        } catch (err) {
            document.getElementById('appContent').innerHTML = `<div class="card" style="text-align:center; padding:3rem;"><i class="fas fa-exclamation-triangle" style="font-size:2rem; color:var(--accent-pink);"></i><h3>Erreur réseau</h3><p>${err.message}</p><button onclick="loadData()" style="margin-top:1rem; background:var(--accent-cyan); border:none; padding:0.5rem 1.5rem; border-radius:40px; color:#000; font-weight:600; cursor:pointer;">Réessayer</button></div>`;
        }
    }

    window.generateAndDisplayPrompt = generateAndDisplayPrompt;
    window.resetPromptDisplay = resetPromptDisplay;
    window.copyGeneratedPrompt = copyGeneratedPrompt;
    window.exportCurrentDependencies = exportCurrentDependencies;
    loadData();
</script>
</body>
</html>
